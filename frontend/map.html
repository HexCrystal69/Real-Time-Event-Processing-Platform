<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GRIP — Global Risk Map</title>
  <link rel="stylesheet" href="/css/main.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css">
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar">
      <div class="sidebar-brand"><div class="logo">G</div><div><h1>GRIP</h1><span>Global Risk Intelligence</span></div></div>
      <nav class="sidebar-nav">
        <div class="nav-section">Command</div>
        <a href="index.html" class="nav-link"><span class="icon">◉</span> Dashboard</a>
        <a href="map.html" class="nav-link"><span class="icon">🌍</span> Global Risk Map</a>
        <div class="nav-section">Intelligence</div>
        <a href="earthquakes.html" class="nav-link"><span class="icon">⚡</span> Earthquakes</a>
        <a href="wildfires.html" class="nav-link"><span class="icon">🔥</span> Wildfires</a>
        <a href="weather.html" class="nav-link"><span class="icon">⛈</span> Weather</a>
        <a href="air-quality.html" class="nav-link"><span class="icon">💨</span> Air Quality</a>
        <div class="nav-section">Operations</div>
        <a href="analytics.html" class="nav-link"><span class="icon">📊</span> Analytics</a>
        <a href="forecasting.html" class="nav-link"><span class="icon">📈</span> Forecasting</a>
        <a href="monitoring.html" class="nav-link"><span class="icon">🖥</span> Monitoring</a>
        <a href="about.html" class="nav-link"><span class="icon">ℹ</span> About</a>
      </nav>
      <div class="sidebar-status"><span class="status-dot live"></span><span class="ws-status-text">LIVE</span></div>
    </aside>
    <main class="main-content">
      <header class="top-bar">
        <div style="display:flex;align-items:center;gap:12px">
          <button class="menu-toggle">☰</button>
          <h2>Global Risk Map</h2>
        </div>
        <div class="top-bar-actions">
          <span id="live-clock" style="font-family:var(--font-mono);font-size:12px;color:var(--text-muted)"></span>
          <div id="map-stats" style="display:flex;gap:16px;font-size:12px;font-family:var(--font-mono)"></div>
        </div>
      </header>
      <div class="page-content fade-in">
        <div class="filter-bar">
          <label><input type="checkbox" class="filter-toggle" data-layer="earthquakes" checked> Earthquakes</label>
          <label><input type="checkbox" class="filter-toggle" data-layer="wildfires" checked> Wildfires</label>
          <label><input type="checkbox" class="filter-toggle" data-layer="weather" checked> Weather Alerts</label>
          <label><input type="checkbox" class="filter-toggle" data-layer="air_quality" checked> Air Quality</label>
        </div>
        <div class="map-container full" id="risk-map"></div>
      </div>
    </main>
  </div>
  <script src="/js/config.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/websocket.js"></script>
  <script src="/js/common.js"></script>
  <script src="/js/map.js"></script>
  <script src="/js/map-page.js"></script>
</body>
</html>
